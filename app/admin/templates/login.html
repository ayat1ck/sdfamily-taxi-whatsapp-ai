<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход в админку</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #0b0d10; color: #f3f4f6; font-family: Arial, sans-serif; }
    .card { width: min(420px, 92vw); background: #11151a; border: 1px solid #242b34; border-radius: 10px; padding: 24px; }
    h1 { margin-top: 0; }
    form { display: grid; gap: 12px; }
    input { width: 100%; background: #171c22; color: #f3f4f6; border: 1px solid #242b34; border-radius: 6px; padding: 10px 12px; box-sizing: border-box; }
    button { background: #f5b600; border: 0; border-radius: 6px; padding: 10px 14px; font-weight: 700; cursor: pointer; }
    .error { background: rgba(239, 68, 68, 0.16); color: #fca5a5; padding: 10px 12px; border-radius: 6px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Вход в админку</h1>
    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}
    <form method="post" action="/admin/login">
      <label>Логин
        <input type="text" name="username" required autofocus>
      </label>
      <label>Пароль
        <input type="password" name="password" required>
      </label>
      <button type="submit">Войти</button>
    </form>
  </div>
</body>
</html>
