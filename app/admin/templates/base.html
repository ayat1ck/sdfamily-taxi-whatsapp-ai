<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}SD Family Admin{% endblock %}</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0d10;
      --panel: #11151a;
      --panel-alt: #171c22;
      --line: #242b34;
      --text: #f3f4f6;
      --muted: #9ca3af;
      --accent: #f5b600;
      --danger: #ef4444;
      --good: #22c55e;
      --warn: #f59e0b;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: var(--bg); color: var(--text); }
    a { color: inherit; text-decoration: none; }
    .layout { display: grid; grid-template-columns: 240px minmax(0, 1fr); min-height: 100vh; }
    .sidebar { border-right: 1px solid var(--line); background: #0f1216; padding: 24px 16px; }
    .brand { font-size: 20px; font-weight: 700; margin-bottom: 24px; }
    .nav { display: grid; gap: 8px; }
    .nav a { padding: 10px 12px; border-radius: 6px; color: var(--muted); }
    .nav a.active, .nav a:hover { background: var(--panel); color: var(--text); }
    .content { padding: 20px; }
    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 16px; }
    .topbar h1 { margin: 0; font-size: 24px; }
    .logout-form { margin: 0; }
    button, .button {
      background: var(--accent);
      color: #111;
      border: 0;
      border-radius: 6px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 700;
    }
    button.secondary, .button.secondary {
      background: var(--panel-alt);
      color: var(--text);
      border: 1px solid var(--line);
    }
    button.danger { background: var(--danger); color: white; }
    input, select, textarea {
      width: 100%;
      background: var(--panel-alt);
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px 12px;
    }
    textarea { min-height: 100px; resize: vertical; }
    .grid { display: grid; gap: 16px; }
    .stats { display: grid; gap: 16px; grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .card { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 16px; }
    .card h3, .card h4 { margin-top: 0; }
    .muted { color: var(--muted); }
    .badge { display: inline-block; padding: 4px 8px; border-radius: 999px; font-size: 12px; font-weight: 700; }
    .badge.warn { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }
    .badge.good { background: rgba(34, 197, 94, 0.2); color: #86efac; }
    .badge.bad { background: rgba(239, 68, 68, 0.2); color: #fca5a5; }
    .table { width: 100%; border-collapse: collapse; }
    .table th, .table td { padding: 10px; border-bottom: 1px solid var(--line); text-align: left; vertical-align: top; }
    .stack { display: grid; gap: 12px; }
    .inline-form { display: flex; gap: 8px; align-items: center; }
    .filters { display: grid; gap: 12px; grid-template-columns: repeat(4, minmax(0, 1fr)); margin-bottom: 16px; }
    .chat-layout { display: grid; grid-template-columns: 320px minmax(0, 1fr) 360px; gap: 16px; align-items: start; }
    .chat-list { max-height: calc(100vh - 180px); overflow: auto; }
    .chat-item { display: block; padding: 12px; border-radius: 8px; border: 1px solid var(--line); background: var(--panel); margin-bottom: 8px; }
    .chat-item.active { border-color: var(--accent); }
    .message-list { max-height: calc(100vh - 280px); overflow: auto; display: grid; gap: 12px; }
    .message-row { display: flex; width: 100%; }
    .message-row.left { justify-content: flex-start; }
    .message-row.right { justify-content: flex-end; }
    .message-row.center { justify-content: center; }
    .message {
      width: min(78%, 720px);
      border-radius: 14px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      background: var(--panel-alt);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.16);
    }
    .message.incoming {
      border-color: rgba(96, 165, 250, 0.28);
      background: rgba(96, 165, 250, 0.08);
    }
    .message.bot {
      border-color: rgba(245, 182, 0, 0.34);
      background: rgba(245, 182, 0, 0.10);
    }
    .message.manager {
      border-color: rgba(34, 197, 94, 0.34);
      background: rgba(34, 197, 94, 0.10);
    }
    .message.system {
      width: min(64%, 620px);
      border-color: rgba(245, 158, 11, 0.34);
      background: #15120c;
    }
    .message-meta { display: flex; justify-content: space-between; gap: 8px; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .message-author { font-weight: 700; color: var(--text); }
    .message-type { opacity: 0.8; }
    .section-title { margin: 0 0 12px; font-size: 16px; }
    .kv { display: grid; gap: 8px; }
    .kv div { display: flex; justify-content: space-between; gap: 12px; border-bottom: 1px solid var(--line); padding-bottom: 6px; }
    .two-col { display: grid; gap: 16px; grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .actions { display: flex; flex-wrap: wrap; gap: 8px; }
    .notice { padding: 12px; border-radius: 8px; background: rgba(245, 182, 0, 0.12); border: 1px solid rgba(245, 182, 0, 0.3); }
    @media (max-width: 1400px) {
      .chat-layout { grid-template-columns: 280px minmax(0, 1fr); }
      .chat-side { grid-column: span 2; }
      .stats, .filters, .two-col { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
  <script>
    async function adminPost(url, method = "POST", body = null) {
      const headers = { "X-CSRF-Token": "{{ csrf_token }}" };
      if (body && !(body instanceof FormData)) {
        headers["Content-Type"] = "application/json";
      }
      const response = await fetch(url, { method, headers, body: body instanceof FormData ? body : (body ? JSON.stringify(body) : null) });
      if (!response.ok) {
        const payload = await response.text();
        throw new Error(payload || "Request failed");
      }
      const contentType = response.headers.get("content-type") || "";
      if (contentType.includes("application/json")) {
        return response.json();
      }
      return null;
    }
  </script>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">SD Family Admin</div>
      <nav class="nav">
        <a href="/admin" class="{% if nav == 'dashboard' %}active{% endif %}">Дашборд</a>
        <a href="/admin/chats" class="{% if nav == 'chats' %}active{% endif %}">Чаты</a>
        <a href="/admin/applications" class="{% if nav == 'applications' %}active{% endif %}">Заявки</a>
        <a href="/admin/documents" class="{% if nav == 'documents' %}active{% endif %}">Документы</a>
        <a href="/admin/integrations" class="{% if nav == 'integrations' %}active{% endif %}">Интеграции</a>
        <a href="/admin/audit" class="{% if nav == 'audit' %}active{% endif %}">Аудит</a>
      </nav>
      {% if admin_username %}
      <form style="margin-top:24px;" method="post" action="/admin/logout">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <button class="secondary" type="submit" style="width:100%;">Выйти</button>
      </form>
      {% endif %}
    </aside>
    <main class="content">
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
